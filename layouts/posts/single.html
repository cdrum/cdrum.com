{{ define "main" }}
<div class="wrap">
  <article>
    <div class="post-hd">
      <h1>{{ .Title }}</h1>
      <div class="post-meta">
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2 January 2006" }}</time>
        {{ with .Params.tags }}
        <div class="card-tags">{{ range . }}<span class="tag">{{ . }}</span>{{ end }}</div>
        {{ end }}
      </div>
    </div>
    <div class="prose">{{ .Content }}</div>
  </article>
</div>
{{ end }}
